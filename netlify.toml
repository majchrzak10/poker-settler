# Poker Settler — Vite build → katalog dist/ (statyczna PWA).
#
# Netlify Dashboard: Build command = npm run build | Publish directory = dist
# Opcjonalnie: zmienne VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY (nadpisują domyślne z src/config.ts).

[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
