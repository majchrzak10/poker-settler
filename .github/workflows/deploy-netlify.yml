# Opcjonalnie: ręczne wdrożenie z zakładki Actions → Run workflow.
# Wymaga sekretów: NETLIFY_AUTH_TOKEN, NETLIFY_SITE_ID (Settings → Secrets → Actions).
#
# Standardowe podejście bez Actions: w Netlify „Add site → Import from Git” i wybierz to repo —
# wtedy każdy push na main buduje stronę automatycznie (netlify.toml jest w katalogu głównym).

name: Deploy to Netlify (manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g netlify-cli
      - run: netlify deploy --prod --dir . --message "${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
