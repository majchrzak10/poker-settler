# Opcjonalny deploy z GitHub Actions (Run workflow). Wymaga sekretów:
#   NETLIFY_AUTH_TOKEN, NETLIFY_SITE_ID (repo → Settings → Secrets and variables → Actions).
#
# Główna ścieżka: Netlify → Import from Git → to repo → branch main.
# Wtedy Netlify sam deployuje przy każdym pushu — nie uruchamiaj tego workflow równolegle,
# żeby uniknąć podwójnego wdrożenia.

name: Deploy to Netlify (manual)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g netlify-cli
      - run: netlify deploy --prod --dir . --message "${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
